<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lecture Lens Prototype</title>
    <meta name="description" content="Deployable frontend prototype for Lecture Lens" />
    <style>
      :root {
        --bg: #090d14;
        --panel: #111827;
        --panel-2: #0d1117;
        --line: #1f2937;
        --text: #e5e7eb;
        --muted: #9ca3af;
        --accent: #6ee7b7;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      .app { min-height: 100vh; display: grid; place-items: center; padding: 24px; }
      .card {
        width: min(980px, 100%);
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 14px;
        overflow: hidden;
      }
      .topbar {
        background: var(--panel-2);
        border-bottom: 1px solid var(--line);
        padding: 12px 16px;
        display: flex;
        justify-content: space-between;
        gap: 12px;
        font-size: 13px;
        color: var(--muted);
      }
      .brand { font-weight: 700; color: var(--text); }
      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0;
        min-height: 560px;
      }
      .panel { padding: 16px; }
      .panel + .panel { border-left: 1px solid var(--line); }
      .subtitle {
        margin: 0 0 12px;
        color: var(--muted);
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: .08em;
      }
      .transcript {
        background: #0f172a;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 10px;
        height: 460px;
        overflow-y: auto;
      }
      .line { padding: 8px; border-radius: 8px; margin-bottom: 6px; color: var(--muted); }
      .line.active { background: rgba(110, 231, 183, 0.08); color: var(--text); }
      .time { color: #6b7280; margin-right: 8px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
      .concepts {
        display: grid;
        gap: 10px;
        align-content: start;
        max-height: 460px;
        overflow-y: auto;
      }
      .concept {
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 12px;
        background: #0f172a;
      }
      .concept h4 { margin: 0 0 6px; color: var(--accent); }
      .concept p { margin: 0; color: #d1d5db; font-size: 14px; line-height: 1.5; }
      .actions {
        padding: 12px 16px;
        border-top: 1px solid var(--line);
        display: flex;
        gap: 10px;
        justify-content: flex-end;
        background: var(--panel-2);
      }
      button {
        border: 0;
        border-radius: 8px;
        padding: 10px 14px;
        font-weight: 600;
        cursor: pointer;
      }
      .primary { background: linear-gradient(135deg, #065f46, #059669); color: #ecfdf5; }
      .danger { background: #7f1d1d; color: #fecaca; }
      @media (max-width: 860px) {
        .grid { grid-template-columns: 1fr; }
        .panel + .panel { border-left: 0; border-top: 1px solid var(--line); }
      }
    </style>
  </head>
  <body>
    <main id="app" class="app"></main>
    <script src="./lecturelens-prototype.js"></script>
  </body>
</html>
