<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lecture Lens Prototype</title>
    <meta name="description" content="Deployable frontend prototype for Lecture Lens" />
    <style>
      :root {
        --bg: #080d1d;
        --bg-2: #121a34;
        --panel: rgba(10, 16, 33, 0.86);
        --panel-2: rgba(8, 13, 27, 0.92);
        --line: rgba(148, 163, 184, 0.2);
        --text: #e8eefc;
        --muted: #9fb0d6;
        --accent: #65e3c8;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background:
          radial-gradient(900px 500px at 12% -15%, rgba(99, 102, 241, 0.25), transparent 70%),
          radial-gradient(700px 420px at 90% 0%, rgba(20, 184, 166, 0.2), transparent 72%),
          linear-gradient(160deg, var(--bg), var(--bg-2));
        color: var(--text);
      }
      .app { min-height: 100vh; display: grid; place-items: center; padding: 24px; }
      .card {
        width: min(980px, 100%);
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 18px;
        overflow: hidden;
        box-shadow: 0 22px 55px rgba(1, 7, 19, 0.55);
        backdrop-filter: blur(8px);
      }
      .topbar {
        background: var(--panel-2);
        border-bottom: 1px solid var(--line);
        padding: 13px 16px;
        display: flex;
        justify-content: space-between;
        gap: 12px;
        font-size: 13px;
        color: var(--muted);
        align-items: center;
      }
      .brand { font-weight: 700; color: var(--text); }
      .status-chip {
        border: 1px solid rgba(148, 163, 184, 0.35);
        border-radius: 999px;
        padding: 5px 10px;
        background: rgba(15, 23, 42, 0.55);
        color: #cfe0ff;
      }
      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0;
        min-height: 560px;
      }
      .panel { padding: 16px; }
      .panel + .panel { border-left: 1px solid var(--line); }
      .section-title {
        margin: 0 0 12px;
        display: flex;
        align-items: center;
        gap: 8px;
        color: var(--muted);
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: .08em;
      }
      .section-icon {
        width: 24px;
        height: 24px;
        border-radius: 7px;
        display: inline-grid;
        place-items: center;
        background: linear-gradient(135deg, rgba(99, 102, 241, 0.3), rgba(45, 212, 191, 0.25));
        color: #d8e1ff;
        font-size: 13px;
      }
      .transcript {
        background: rgba(15, 23, 42, 0.72);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 10px;
        height: 460px;
        overflow-y: auto;
      }
      .line { padding: 8px; border-radius: 8px; margin-bottom: 6px; color: var(--muted); }
      .line.active {
        background: linear-gradient(90deg, rgba(20, 184, 166, 0.16), rgba(99, 102, 241, 0.17));
        color: var(--text);
      }
      .time { color: #7f8fb0; margin-right: 8px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
      .concepts {
        display: grid;
        gap: 10px;
        align-content: start;
        max-height: 460px;
        overflow-y: auto;
      }
      .concept {
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 12px;
        background: linear-gradient(140deg, rgba(30, 41, 59, 0.7), rgba(15, 23, 42, 0.78));
      }
      .concept--1 { border-color: rgba(52, 211, 153, 0.45); background: linear-gradient(145deg, rgba(6, 95, 70, 0.34), rgba(15, 23, 42, 0.82)); }
      .concept--2 { border-color: rgba(59, 130, 246, 0.42); background: linear-gradient(145deg, rgba(30, 58, 138, 0.32), rgba(15, 23, 42, 0.82)); }
      .concept--3 { border-color: rgba(236, 72, 153, 0.38); background: linear-gradient(145deg, rgba(131, 24, 67, 0.3), rgba(15, 23, 42, 0.82)); }
      .concept--4 { border-color: rgba(250, 204, 21, 0.38); background: linear-gradient(145deg, rgba(113, 63, 18, 0.33), rgba(15, 23, 42, 0.82)); }
      .concept h4 { margin: 0 0 6px; color: #eff6ff; display: flex; align-items: center; gap: 8px; }
      .concept p { margin: 0; color: #d8dded; font-size: 14px; line-height: 1.5; }
      .concept-badge {
        font-size: 12px;
        width: 22px;
        height: 22px;
        border-radius: 999px;
        display: inline-grid;
        place-items: center;
        background: rgba(255, 255, 255, 0.14);
      }
      .actions {
        padding: 12px 16px;
        border-top: 1px solid var(--line);
        display: flex;
        gap: 10px;
        justify-content: flex-end;
        background: var(--panel-2);
      }
      button {
        border: 0;
        border-radius: 10px;
        padding: 10px 14px;
        font-weight: 600;
        cursor: pointer;
      }
      .primary { background: linear-gradient(135deg, #0ea5e9, #14b8a6); color: #ecfeff; box-shadow: 0 8px 24px rgba(20, 184, 166, 0.25); }
      .danger { background: linear-gradient(135deg, #7f1d1d, #be123c); color: #ffe4e6; }
      @media (max-width: 860px) {
        .grid { grid-template-columns: 1fr; }
        .panel + .panel { border-left: 0; border-top: 1px solid var(--line); }
      }
    </style>
  </head>
  <body>
    <main id="app" class="app"></main>
    <script src="./lecturelens-prototype.js"></script>
  </body>
</html>
